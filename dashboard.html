<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mission Z.4 - Dashboard</title>
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<header class="navbar">
  <h2>Mission Z.4</h2>
  <div id="welcomeUser" class="welcome-text"></div>
  <div>
    <button onclick="goToPractice()">Practice</button>
    <button onclick="viewWeakness()">📉 Weakness</button>
    <button onclick="logout()">Logout</button>
    <button onclick="toggleTheme()">🌙</button>
  </div>
</header>

<main class="dashboard">

<section class="top-cards">
  <div class="card">
    <h3>📘 Prelims Overall Completion</h3>
    <p id="prelimsCompletion">0%</p>
  </div>

  <div class="card">
    <h3>📝 Mains Overall Completion</h3>
    <p id="mainsCompletion">0%</p>
  </div>
</section>

  <section class="charts">

<div class="chart-box">
  <div class="chart-box-title-row">
    <h3>Prelims Progress</h3>
    <button class="view-progress-btn" onclick="viewProgress('prelims')">View Progress</button>
  </div>

  <select id="prelims-subject" onchange="loadChapters('prelims')"></select>
  <select id="prelims-chapter"></select>

  <button id="prelimsBtn" onclick="markComplete('prelims')">
    <span class="btn-text">✔ Mark Complete</span>
    <span class="btn-loader hidden"></span>
  </button>

  <canvas id="prelimsChart"></canvas>
</div>

<div class="chart-box">
  <div class="chart-box-title-row">
    <h3>Mains Progress</h3>
    <button class="view-progress-btn" onclick="viewProgress('mains')">View Progress</button>
  </div>

  <select id="mains-subject" onchange="loadChapters('mains')"></select>
  <select id="mains-chapter"></select>

  <button id="mainsBtn" onclick="markComplete('mains')">
    <span class="btn-text">✔ Mark Complete</span>
    <span class="btn-loader hidden"></span>
  </button>

  <canvas id="mainsChart"></canvas>
</div>

  </section>

  <section class="consistency">
    <div style="display:flex; justify-content:space-between; align-items:center;">
  <h3>📅 Daily Study Hours</h3>

<div class="hours-card">
  <input type="number" id="hoursInput" placeholder="Enter hours" />
  <button id="saveBtn" onclick="saveHours()">Save</button>
</div>
</div>
    <canvas id="consistencyChart"></canvas>
  </section>

</main>

<!-- Progress Report Modal -->
<div id="progress-report-overlay" class="modal-overlay hidden">
  <div class="modal-card progress-report-card">
    <div class="report-header">
      <div>
        <h3 id="progressReportTitle">Prelims Progress Report</h3>
        <p class="modal-subtext">Subject-wise completion breakdown</p>
      </div>
      <span id="closeProgressReport" class="modal-close">✖</span>
    </div>

    <div class="report-summary-row" id="progressSummaryRow"></div>

    <div class="progress-subject-list" id="progressSubjectList"></div>

    <div class="report-footer">
      <button id="downloadReportBtn" class="continue-btn-solid">⬇ Download Report</button>
    </div>
  </div>
</div>

<!-- Weakness Report Modal -->
<div id="weakness-overlay" class="modal-overlay hidden">
  <div class="modal-card progress-report-card">
    <div class="report-header">
      <div>
        <h3>Weakness Report</h3>
        <p class="modal-subtext">Chapters flagged by low accuracy or slow attempt time</p>
      </div>
      <span id="closeWeaknessReport" class="modal-close">✖</span>
    </div>

    <div class="report-summary-row" id="weaknessSummaryRow"></div>

    <div id="topWeakSection"></div>

    <div class="progress-subject-list" id="weaknessSubjectList"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/utils.js"></script>

</body>
</html>

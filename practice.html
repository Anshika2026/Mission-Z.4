<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mission Z.4 - Practice</title>
  <link rel="stylesheet" href="css/practice.css">
</head>
<body>

<header class="navbar">
  <h2>Practice</h2>
  <div>
    <button onclick="goToDashboard()">Dashboard</button>
    <button onclick="toggleTheme()">🌙</button>
  </div>
</header>

<main class="practice">

  <section class="subject-select">
    <h3>Select Subject</h3>
    <select id="subject-dropdown" onchange="loadChapters()"></select>
  </section>

  <section class="donut-chart">
    <h3>Attempt Overview</h3>
    <canvas id="attemptChart"></canvas>
  </section>

  <section class="chapter-list" id="chapter-list">
  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/api.js"></script>
<script src="js/practice.js"></script>
<script src="js/utils.js"></script>

</body>
</html>
